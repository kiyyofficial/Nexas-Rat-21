# ---- 21. workflow GitHub Actions ----
cat > "$PROJECT/.github/workflows/build.yml" << 'EOF'
name: Build Nexa APK (Admin + Target)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Admin Release
        run: ./gradlew assembleAdminRelease
      - name: Build Target Release
        run: ./gradlew assembleTargetRelease
      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexa-Admin-APK
          path: app/build/outputs/apk/admin/release/*.apk
      - name: Upload Target APK
        uses: actions/upload-artifact@v4
        with:
          name: Nexa-Target-APK
          path: app/build/outputs/apk/target/release/*.apk
EOF

